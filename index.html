<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>내 부동산 포트폴리오</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#ffffff;--bg2:#f7f7f5;--bg3:#f0efe9;
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#aaaaaa;
  --border:#e8e8e3;--border2:#d0d0c8;
  --blue:#2979d0;--blue-bg:#E6F1FB;--blue-dark:#0C447C;
  --green-bg:#EAF3DE;--green-dark:#27500A;
  --amber-bg:#FAEEDA;--amber-dark:#633806;
  --teal-bg:#E1F5EE;--teal-dark:#085041;
  --gray-bg:#F1EFE8;--gray-dark:#444441;
  --red:#E24B4A;
  --nav-h:60px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#000000;
    --text:#f2f2f7;--text2:#aeaeb2;--text3:#545456;
    --border:#38383a;--border2:#48484a;
    --blue:#5ca3f5;--blue-bg:#0d2744;--blue-dark:#85B7EB;
    --green-bg:#0f2206;--green-dark:#97C459;
    --amber-bg:#2a1800;--amber-dark:#EF9F27;
    --teal-bg:#041a12;--teal-dark:#5DCAA5;
    --gray-bg:#2c2c2e;--gray-dark:#aeaeb2;
  }
}
html,body{height:100%;background:var(--bg3)}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;color:var(--text);max-width:480px;margin:0 auto;position:relative}

/* ── SCREENS ── */
.screen{display:none;flex-direction:column;min-height:calc(100dvh - var(--nav-h))}
.screen.active{display:flex}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:20px}

/* ── HEADER ── */
.hdr{height:52px;display:flex;align-items:center;padding:0 16px;background:var(--bg);border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:50;flex-shrink:0}
.hdr-title{font-size:17px;font-weight:600;color:var(--text);flex:1}
.hdr-btn{background:none;border:none;cursor:pointer;font-size:15px;color:var(--blue);font-weight:500;padding:6px 0}
.hdr-back{display:flex;align-items:center;gap:2px;color:var(--blue);background:none;border:none;cursor:pointer;font-size:16px;font-weight:500;margin-right:8px}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:var(--nav-h);background:var(--bg);border-top:0.5px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0px)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;color:var(--text3);font-size:10px;font-weight:500}
.nb.on{color:var(--blue)}
.nb svg{width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}

/* ── LIST SCREEN ── */
.sec-hdr{padding:20px 16px 8px;font-size:12px;font-weight:700;color:var(--text3);letter-spacing:0.08em}
.acard{background:var(--bg);margin:0 12px 8px;border-radius:14px;border:0.5px solid var(--border);overflow:hidden;cursor:pointer}
.acard:active{opacity:0.65}
.acard-row{display:flex;align-items:center;padding:13px 16px;gap:12px}
.aicon{width:46px;height:46px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.acard-body{flex:1;min-width:0}
.acard-name{font-size:15px;font-weight:600;color:var(--text)}
.acard-addr{font-size:12px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.acard-chevron{color:var(--text3);font-size:18px;line-height:1}
.acard-badges{display:flex;gap:5px;padding:0 16px 12px 74px;flex-wrap:wrap}
.badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700}
.b-apt{background:var(--blue-bg);color:var(--blue-dark)}
.b-land{background:var(--green-bg);color:var(--green-dark)}
.b-shop{background:var(--amber-bg);color:var(--amber-dark)}
.b-house{background:var(--teal-bg);color:var(--teal-dark)}
.b-etc{background:var(--gray-bg);color:var(--gray-dark)}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 24px;gap:10px;color:var(--text2);text-align:center}
.empty svg{width:52px;height:52px;stroke:var(--text3)}
.empty p{font-size:15px}
.empty small{font-size:13px;color:var(--text3)}
.empty-btn{margin-top:12px;padding:12px 28px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}

/* ── DETAIL SCREEN ── */
.d-hero{background:var(--bg);padding:16px;border-bottom:0.5px solid var(--border)}
.d-hero-top{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.d-icon{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.d-name{font-size:19px;font-weight:700;color:var(--text)}
.d-addr{font-size:13px;color:var(--text2);margin-top:3px}
.d-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.d-cell{background:var(--bg2);border-radius:10px;padding:10px 12px}
.d-cell-lbl{font-size:11px;color:var(--text2);margin-bottom:3px}
.d-cell-val{font-size:13px;font-weight:600;color:var(--text)}

.blk{background:var(--bg);border-top:0.5px solid var(--border);border-bottom:0.5px solid var(--border);margin-bottom:10px}
.blk-title{padding:13px 16px 5px;font-size:12px;font-weight:700;color:var(--text3);letter-spacing:0.07em}
.litem{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:0.5px solid var(--border);text-decoration:none;color:var(--text);background:var(--bg);cursor:pointer}
.litem:last-child{border-bottom:none}
.copy-bar{display:flex;align-items:center;gap:8px;padding:9px 16px;background:var(--bg2);border-bottom:0.5px solid var(--border);border-top:0.5px solid var(--border)}
.copy-lbl{font-size:12px;color:var(--text3)}
.copy-kw{font-size:13px;font-weight:600;color:var(--text);flex:1}
.copy-btn{padding:5px 12px;border:0.5px solid var(--border2);border-radius:20px;background:var(--bg);color:var(--blue);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.copy-btn.done{color:var(--teal-dark);border-color:var(--teal-dark)}
.toast{position:fixed;bottom:84px;left:16px;right:16px;background:#1a1a1a;color:#fff;padding:13px 18px;border-radius:14px;font-size:14px;line-height:1.5;z-index:999;opacity:0;pointer-events:none;transition:opacity 0.25s;text-align:center}
.toast.show{opacity:1}
.litem:active{background:var(--bg2)}
.ldot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.lbody{flex:1}
.lbody-main{font-size:15px;color:var(--text)}
.lbody-sub{font-size:12px;color:var(--text2);margin-top:2px}
.lchevron{color:var(--text3);font-size:16px}

/* ── SETTINGS SCREEN ── */
.settings-sec{margin-bottom:10px}
.settings-sec .sec-hdr{padding-top:16px}
.settings-list{background:var(--bg);border-top:0.5px solid var(--border);border-bottom:0.5px solid var(--border)}
.sitem{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:0.5px solid var(--border);cursor:pointer;background:var(--bg)}
.sitem:last-child{border-bottom:none}
.sitem:active{background:var(--bg2)}
.sitem-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.sitem-body{flex:1;min-width:0}
.sitem-name{font-size:15px;font-weight:500;color:var(--text)}
.sitem-sub{font-size:12px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sitem-chevron{color:var(--text3)}

.add-btn{display:flex;align-items:center;justify-content:center;gap:6px;margin:0 12px 8px;padding:14px;background:var(--bg);border:0.5px dashed var(--border2);border-radius:14px;cursor:pointer;font-size:15px;color:var(--blue);font-weight:500}
.add-btn:active{background:var(--bg2)}

/* ── BOTTOM SHEET ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{background:var(--bg);border-radius:22px 22px 0 0;width:100%;max-width:480px;max-height:92dvh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom,16px)}
.sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:10px auto 2px}
.sheet-hdr{display:flex;align-items:center;padding:8px 16px 14px;border-bottom:0.5px solid var(--border)}
.sheet-title{font-size:17px;font-weight:600;color:var(--text);flex:1;text-align:center}
.sheet-cancel{font-size:15px;color:var(--blue);background:none;border:none;cursor:pointer}
.sheet-save{font-size:15px;color:var(--blue);font-weight:700;background:none;border:none;cursor:pointer}

.fsec{padding:16px 16px 0}
.fsec-title{font-size:13px;font-weight:700;color:var(--text3);letter-spacing:0.05em;margin-bottom:10px}
.fgroup{margin-bottom:12px}
.flabel{font-size:13px;color:var(--text2);margin-bottom:5px;display:block}
.finput{width:100%;padding:12px 14px;border:0.5px solid var(--border2);border-radius:10px;background:var(--bg2);color:var(--text);font-size:15px;-webkit-appearance:none;appearance:none}
.finput:focus{outline:none;border-color:var(--blue)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.type-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:4px}
.type-btn{padding:9px 4px;border:0.5px solid var(--border2);border-radius:10px;background:var(--bg2);color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;text-align:center}
.type-btn.sel{border-color:var(--blue);background:var(--blue-bg);color:var(--blue-dark)}

.del-zone{padding:16px}
.del-btn{width:100%;padding:14px;border:0.5px solid var(--red);border-radius:10px;background:none;color:var(--red);font-size:15px;font-weight:500;cursor:pointer}
.del-btn:active{background:#fff0f0}

/* ── API SHEET ── */
.api-info{margin:12px 16px;padding:12px 14px;background:var(--amber-bg);border-radius:10px;font-size:13px;color:var(--amber-dark);line-height:1.6}
.api-status{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600}
.api-status.set{background:var(--teal-bg);color:var(--teal-dark)}
.api-status.unset{background:var(--gray-bg);color:var(--gray-dark)}
.api-dot{width:7px;height:7px;border-radius:50%}
.api-dot.set{background:#1D9E75}
.api-dot.unset{background:#888780}
.pw-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px}
.pw-wrap{position:relative}
.pw-wrap .finput{padding-right:60px}
</style>
</head>
<body>

<!-- ── LIST SCREEN ── -->
<div class="screen active" id="scr-list">
  <div class="hdr">
    <span class="hdr-title">내 부동산</span>
  </div>
  <div class="scroll" id="list-scroll"></div>
</div>

<!-- ── DETAIL SCREEN ── -->
<div class="screen" id="scr-detail">
  <div class="hdr">
    <button class="hdr-back" onclick="showScreen('list')">
      <svg viewBox="0 0 10 16" width="10" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="8,1 2,8 8,15"/></svg>
      목록
    </button>
    <span class="hdr-title" id="detail-title"></span>
    <button class="hdr-btn" onclick="openEditFromDetail()">편집</button>
  </div>
  <div class="scroll" id="detail-scroll"></div>
</div>

<!-- ── SETTINGS SCREEN ── -->
<div class="screen" id="scr-settings">
  <div class="hdr"><span class="hdr-title">설정</span></div>
  <div class="scroll" id="settings-scroll"></div>
</div>

<!-- ── BOTTOM NAV ── -->
<nav class="bnav">
  <button class="nb on" id="nb-list" onclick="showScreen('list')">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="8" rx="1.5"/><rect x="3" y="13" width="8" height="8" rx="1.5"/><rect x="13" y="13" width="8" height="8" rx="1.5"/></svg>
    목록
  </button>
  <button class="nb" id="nb-settings" onclick="showScreen('settings')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>
    설정
  </button>
</nav>

<!-- ── ASSET EDIT SHEET ── -->
<div class="overlay" id="asset-overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-hdr">
      <button class="sheet-cancel" onclick="closeAssetSheet()">취소</button>
      <span class="sheet-title" id="asset-sheet-title">자산 추가</span>
      <button class="sheet-save" onclick="saveAsset()">저장</button>
    </div>

    <div class="fsec">
      <div class="fsec-title">기본 정보</div>
      <div class="fgroup">
        <label class="flabel">자산명 *</label>
        <input class="finput" id="f-name" placeholder="예: 대치 아이파크" maxlength="30">
      </div>
      <div class="fgroup">
        <label class="flabel">주소 *</label>
        <input class="finput" id="f-addr" placeholder="예: 서울 강남구 대치동 000" maxlength="60">
      </div>
      <div class="fgroup">
        <label class="flabel">유형</label>
        <div class="type-grid">
          <button class="type-btn sel" data-t="apt" onclick="selType(this)">아파트</button>
          <button class="type-btn" data-t="house" onclick="selType(this)">빌라/주택</button>
          <button class="type-btn" data-t="land" onclick="selType(this)">토지</button>
          <button class="type-btn" data-t="shop" onclick="selType(this)">상가/오피스</button>
        </div>
      </div>
    </div>

    <div class="fsec" style="padding-top:14px">
      <div class="fsec-title">매입 정보</div>
      <div class="frow">
        <div class="fgroup">
          <label class="flabel">매입가 (만원)</label>
          <input class="finput" id="f-buy" placeholder="예: 120000" type="text" inputmode="numeric">
        </div>
        <div class="fgroup">
          <label class="flabel">매입 연도</label>
          <input class="finput" id="f-year" placeholder="예: 2019" type="text" inputmode="numeric" maxlength="4">
        </div>
      </div>
      <div class="frow">
        <div class="fgroup">
          <label class="flabel">면적 (㎡)</label>
          <input class="finput" id="f-area" placeholder="예: 84.9" type="text" inputmode="decimal">
        </div>
        <div class="fgroup">
          <label class="flabel">층수/호수</label>
          <input class="finput" id="f-floor" placeholder="예: 12층 1201호" maxlength="20">
        </div>
      </div>
    </div>

    <div class="fsec" style="padding-top:14px">
      <div class="fsec-title">검색 키워드 (뉴스/블로그 검색에 사용)</div>
      <div class="fgroup">
        <label class="flabel">검색어 (띄어쓰기로 구분)</label>
        <input class="finput" id="f-keywords" placeholder="예: 대치동 아이파크 재건축" maxlength="60">
      </div>

      <div class="fgroup">
        <label class="flabel">메모</label>
        <input class="finput" id="f-memo" placeholder="예: 전세 만료 2026.05" maxlength="80">
      </div>
    </div>

    <div class="del-zone" id="del-zone" style="display:none">
      <button class="del-btn" onclick="deleteAsset()">이 자산 삭제</button>
    </div>
    <div style="height:16px"></div>
  </div>
</div>

<!-- ── API SETTINGS SHEET ── -->
<div class="overlay" id="api-overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-hdr">
      <button class="sheet-cancel" onclick="closeApiSheet()">취소</button>
      <span class="sheet-title">API 설정</span>
      <button class="sheet-save" onclick="saveApiSettings()">저장</button>
    </div>

    <div class="api-info">
      API 키는 이 기기에만 저장되며 외부로 전송되지 않습니다. 공공 데이터포털(data.go.kr) 또는 네이버 개발자센터에서 발급받으세요.
    </div>

    <div class="fsec" style="padding-top:14px">
      <div class="fsec-title">공공데이터포털 (실거래가·공시지가)</div>
      <div class="fgroup">
        <label class="flabel">서비스 인증키</label>
        <div class="pw-wrap">
          <input class="finput" id="api-public" placeholder="발급받은 서비스 인증키 입력" type="password">
          <button class="pw-toggle" onclick="togglePw('api-public',this)">표시</button>
        </div>
      </div>
      <div class="fgroup">
        <label class="flabel" style="color:var(--text3);font-size:12px">발급처: <a href="https://www.data.go.kr" target="_blank" style="color:var(--blue)">data.go.kr</a> → 부동산 실거래가 API</label>
      </div>
    </div>

    <div class="fsec" style="padding-top:6px">
      <div class="fsec-title">네이버 개발자센터 (뉴스·블로그 검색)</div>
      <div class="frow">
        <div class="fgroup">
          <label class="flabel">Client ID</label>
          <input class="finput" id="api-naver-id" placeholder="Client ID">
        </div>
        <div class="fgroup">
          <label class="flabel">Client Secret</label>
          <div class="pw-wrap">
            <input class="finput" id="api-naver-secret" placeholder="Secret" type="password">
            <button class="pw-toggle" onclick="togglePw('api-naver-secret',this)">표시</button>
          </div>
        </div>
      </div>
      <div class="fgroup">
        <label class="flabel" style="color:var(--text3);font-size:12px">발급처: <a href="https://developers.naver.com" target="_blank" style="color:var(--blue)">developers.naver.com</a> → 검색 API</label>
      </div>
    </div>

    <div class="fsec" style="padding-top:6px">
      <div class="fsec-title">Anthropic Claude API (AI 기능)</div>
      <div class="fgroup">
        <label class="flabel">API Key</label>
        <div class="pw-wrap">
          <input class="finput" id="api-claude" placeholder="sk-ant-..." type="password">
          <button class="pw-toggle" onclick="togglePw('api-claude',this)">표시</button>
        </div>
      </div>
      <div class="fgroup">
        <label class="flabel" style="color:var(--text3);font-size:12px">발급처: <a href="https://console.anthropic.com" target="_blank" style="color:var(--blue)">console.anthropic.com</a> — 키는 이 기기에만 저장됩니다</label>
      </div>
    </div>

    <div style="height:20px"></div>
  </div>
</div>

<script>
const LS_ASSETS = 'rePF_assets_v2';
const LS_API    = 'rePF_api_v1';

let assets = [];
let apiCfg  = {};
let curIdx  = -1;
let editIdx = -1;

function loadData(){
  try{ assets = JSON.parse(localStorage.getItem(LS_ASSETS)||'[]') }catch(e){assets=[]}
  try{ apiCfg  = JSON.parse(localStorage.getItem(LS_API)||'{}') }catch(e){apiCfg={}}
}
function saveAssets(){ localStorage.setItem(LS_ASSETS, JSON.stringify(assets)) }
function saveApi(){ localStorage.setItem(LS_API, JSON.stringify(apiCfg)) }

/* ── ICONS & BADGES ── */
const ICONS = {apt:'🏢',house:'🏡',land:'🌿',shop:'🏪',etc:'📦'};
const BADGE_CLASS = {apt:'b-apt',house:'b-house',land:'b-land',shop:'b-shop',etc:'b-etc'};
const BADGE_LABEL = {apt:'아파트',house:'빌라/주택',land:'토지',shop:'상가/오피스',etc:'기타'};
const ICON_BG = {apt:'var(--blue-bg)',house:'var(--teal-bg)',land:'var(--green-bg)',shop:'var(--amber-bg)',etc:'var(--gray-bg)'};

/* ── SCREEN ROUTING ── */
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('scr-'+name).classList.add('active');

function openApp(site, name){
  const enc = encodeURIComponent(name);
  const urls = {
    naver: {
      intent: 'intent://search?query='+enc+'#Intent;scheme=navermap;package=com.nhn.android.nmap;S.browser_fallback_url=https%3A%2F%2Fm.land.naver.com%2Fsearch%3Fquery%3D'+enc+';end',
      web:    'https://m.land.naver.com/search?query='+enc
    },
    hogan: {
      intent: 'intent://search?query='+enc+'#Intent;scheme=hogangnono;package=com.hogangnono.hogangnono;S.browser_fallback_url=https%3A%2F%2Fhogangnono.com%2F;end',
      web:    'https://hogangnono.com/'
    },
    disco: {
      intent: 'intent://map?q='+enc+'#Intent;scheme=disco;package=re.disco.android;S.browser_fallback_url=https%3A%2F%2Fwww.disco.re%2Fmap%3Fq%3D'+enc+';end',
      web:    'https://www.disco.re/map?q='+enc
    },
    asil: {
      intent: 'intent://search?searchWord='+enc+'#Intent;scheme=asil;package=kr.asil.app;S.browser_fallback_url=https%3A%2F%2Fasil.kr%2Fasil%2Fsearch%3FsearchWord%3D'+enc+';end',
      web:    'https://asil.kr/asil/search?searchWord='+enc
    },
    molit: {
      intent: null,
      web:    'https://rt.molit.go.kr/'
    }
  };
  const u = urls[site];
  if(!u) return;
  autoCopy(name);
  if(u.intent){
    const start = Date.now();
    window.location.href = u.intent;
    setTimeout(()=>{
      if(Date.now() - start < 2000){
        window.open(u.web, '_blank');
      }
    }, 1200);
  } else {
    window.open(u.web, '_blank');
  }
}

/* ── AUTO COPY ── */
function showToast(msg){
  let t = document.getElementById('toast');
  if(!t){ t=document.createElement('div'); t.id='toast'; t.className='toast'; document.body.appendChild(t); }
  t.innerHTML = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove('show'), 1800);
}
function autoCopy(text){
  try{
    navigator.clipboard.writeText(text).then(()=>{
      showToast('✓ <b>'+text+'</b> 복사됨<br>사이트 검색창에 붙여넣기 하세요');
    }).catch(()=>fallbackCopy(text));
  } catch(e){ fallbackCopy(text); }
}
function fallbackCopy(text){
  const el = document.createElement('textarea');
  el.value = text;
  el.style.cssText='position:fixed;top:-999px;left:-999px';
  document.body.appendChild(el);
  el.select();
  try{ document.execCommand('copy'); showToast('✓ <b>'+text+'</b> 복사됨<br>사이트 검색창에 붙여넣기 하세요'); } catch(e){}
  document.body.removeChild(el);
}
function autoCopyBtn(btn, text){
  autoCopy(text);
  btn.textContent='복사됨 ✓';
  btn.classList.add('done');
  setTimeout(()=>{ btn.textContent='복사'; btn.classList.remove('done'); }, 2000);
}

/* ── CLOSE OVERLAY ON BG TAP ── */
document.getElementById('asset-overlay').addEventListener('click',function(e){ if(e.target===this) closeAssetSheet() });
document.getElementById('api-overlay').addEventListener('click',function(e){ if(e.target===this) closeApiSheet() });

/* ── BACK BUTTON ── */
document.getElementById('scr-list').addEventListener('click',function(){});
window.addEventListener('popstate',function(){ showScreen('list') });

/* ── INIT ── */
loadData();
renderList();
</script>
